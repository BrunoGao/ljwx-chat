apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: chat

resources:
- namespace.yaml
- configmap.yaml
- secret.yaml
- deployment.yaml
- service.yaml
- ingress.yaml

# Common labels
commonLabels:
  app.kubernetes.io/name: lobechat
  app.kubernetes.io/instance: production
  app.kubernetes.io/version: "1.0.0"
  app.kubernetes.io/component: web
  app.kubernetes.io/managed-by: kubectl

# Images (can be used to override image tags)
images:
- name: your-registry/lobechat
  newTag: latest
