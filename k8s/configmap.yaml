apiVersion: v1
kind: ConfigMap
metadata:
  name: lobechat-config
  namespace: chat
data:
  # Node Configuration
  NODE_ENV: "production"
  PORT: "3210"
  HOSTNAME: "0.0.0.0"

  # Database Configuration
  DATABASE_DRIVER: "node"

  # Ollama Configuration
  ENABLED_OLLAMA: "1"
  OLLAMA_PROXY_URL: "http://ollama-service:11434"

  # Authentication
  NEXT_PUBLIC_ENABLE_NEXT_AUTH: "1"
  NEXT_PUBLIC_ENABLE_LOCAL_AUTH: "1"
  NEXT_AUTH_SSO_SESSION_STRATEGY: "jwt"
  NEXT_AUTH_SSO_PROVIDERS: ""
  AUTH_TRUST_HOST: "true"

  # Email Service
  EMAIL_ENABLED: "false"

  # Public URLs
  NEXT_PUBLIC_BASE_URL: "https://chat.omniverseai.net"
  NEXTAUTH_URL: "https://chat.omniverseai.net"

  # S3 Storage Configuration
  S3_BUCKET: "lobechat"
  S3_ENABLE_PATH_STYLE: "true"

  # Middleware Settings
  MIDDLEWARE_REWRITE_THROUGH_LOCAL: "1"
