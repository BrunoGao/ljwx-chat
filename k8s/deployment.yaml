apiVersion: apps/v1
kind: Deployment
metadata:
  name: lobechat
  namespace: chat
  labels:
    app: lobechat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lobechat
  template:
    metadata:
      labels:
        app: lobechat
    spec:
      containers:
      - name: lobechat
        # Replace with your actual image
        image: your-registry/lobechat:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3210
          name: http
          protocol: TCP

        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: lobechat-config
        - secretRef:
            name: lobechat-secrets

        # Health checks
        livenessProbe:
          httpGet:
            path: /
            port: 3210
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /
            port: 3210
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        # Resource limits
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

        # Security context
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false

      # Image pull secrets (if using private registry)
      # imagePullSecrets:
      # - name: registry-secret

      # Pod anti-affinity for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - lobechat
              topologyKey: kubernetes.io/hostname
